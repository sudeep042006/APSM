<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1e3a8a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0ea5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Swoosh / Paper plane trail -->
  <path d="M 120 280 C 120 180, 200 130, 260 120 L 250 150 C 190 160, 160 210, 160 280 Z" fill="url(#grad1)" />
  
  <!-- Paper Plane -->
  <path d="M 230 110 L 330 60 L 260 160 Z" fill="url(#grad1)" />
  <path d="M 230 110 L 255 125 L 260 160 Z" fill="#0f172a" opacity="0.3" />
  
  <!-- Bar Chart -->
  <rect x="200" y="240" width="30" height="60" rx="3" fill="url(#grad2)" />
  <rect x="250" y="200" width="30" height="100" rx="3" fill="url(#grad2)" />
  <rect x="300" y="150" width="30" height="150" rx="3" fill="url(#grad2)" />
</svg>
